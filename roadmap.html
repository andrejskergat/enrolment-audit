<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocialFin — 30-Day Growth Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8f7f4;
  --surface:#ffffff;
  --surface2:#f8fafc;
  --border:#e2e8f0;
  --amber:#f59e0b;
  --orange:#f97316;
  --green:#16a34a;
  --red:#ef4444;
  --blue:#3b82f6;
  --text:#0f172a;
  --muted:#64748b;
  --faint:#f8fafc;
}
body{background:var(--bg);font-family:'IBM Plex Sans',sans-serif;color:var(--text);min-height:100vh}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:20px}

.header-divider{width:1px;height:20px;background:var(--border)}
.header-title{font-size:13px;color:var(--muted);font-weight:500}
.header-badge{display:flex;align-items:center;gap:8px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:100px;padding:5px 14px}
.header-dot{width:6px;height:6px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber);animation:pulse 2s infinite}
.header-label{font-size:11px;font-weight:600;color:#b45309;letter-spacing:0.08em}
.client-input{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;outline:none;padding:2px 8px;width:200px;transition:border 0.2s}
.client-input:focus{border-bottom-color:var(--amber)}
.client-input::placeholder{color:var(--muted)}

/* LAYOUT */
.layout{display:grid;grid-template-columns:340px 1fr;min-height:calc(100vh - 53px)}

/* LEFT PANEL */
.left-panel{background:var(--surface);border-right:1px solid var(--border);padding:24px 20px;overflow-y:auto}
.panel-section{margin-bottom:24px}
.panel-section-title{font-size:10px;font-weight:700;letter-spacing:0.1em;color:#b45309;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(245,158,11,0.2)}

.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px;letter-spacing:0.02em}
.inp-wrap{position:relative}
.inp{width:100%;padding:9px 12px;background:var(--faint);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border 0.2s}
.inp:focus{border-color:rgba(245,158,11,0.5);box-shadow:0 0 0 3px rgba(245,158,11,0.1)}
.inp-pre{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none}
.inp-suf{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none}
.has-pre{padding-left:26px}
.has-suf{padding-right:26px}
select.inp{cursor:pointer;appearance:none}
option{background:#fff;color:var(--text)}

.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.type-btn{padding:7px 8px;border-radius:6px;cursor:pointer;font-size:10px;font-weight:500;font-family:inherit;transition:all 0.15s;border:1.5px solid var(--border);background:var(--faint);color:var(--muted);text-align:center}
.type-btn.active{background:rgba(245,158,11,0.08);border-color:#f59e0b;color:#b45309;font-weight:600}

.gen-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--amber),var(--orange));border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:0.02em;transition:all 0.2s;box-shadow:0 4px 20px rgba(245,158,11,0.35);margin-top:4px}
.gen-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(245,158,11,0.45)}

/* RIGHT PANEL */
.right-panel{padding:32px;overflow-y:auto}

.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:0.4}
.placeholder-icon{font-size:48px}
.placeholder p{font-size:13px;color:var(--muted);text-align:center;max-width:260px;line-height:1.6}

/* CASCADE */
.cascade{display:flex;flex-direction:column;gap:0}

.stage{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}

.stage-header{display:grid;grid-template-columns:auto 1fr auto auto auto;align-items:center;gap:16px;padding:20px 24px;cursor:pointer}
.stage-header:hover{background:#fafafa}

.stage-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.stage-info{flex:1}
.stage-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;font-family:'Playfair Display',serif}
.stage-driver{font-size:11px;color:var(--muted)}

.metric-box{text-align:center;min-width:80px}
.metric-label{font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.metric-value{font-size:18px;font-weight:800;font-family:'IBM Plex Mono',monospace}
.metric-value.now{color:#475569}
.metric-value.after{color:#16a34a}

.arrow-box{display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 4px}
.arrow-icon{font-size:18px;color:#16a34a}
.arrow-pct{font-size:10px;font-weight:700;color:#16a34a;white-space:nowrap}

.stage-body{padding:0 24px 20px;border-top:1px solid var(--border);display:none}
.stage-body.open{display:block}

.stage-detail{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding-top:20px}
.detail-block{}
.detail-title{font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:8px;letter-spacing:0.06em;text-transform:uppercase}
.detail-items{display:flex;flex-direction:column;gap:6px}
.detail-item{font-size:12px;color:#475569;display:flex;gap:8px;line-height:1.5}
.detail-item::before{content:'→';color:var(--amber);flex-shrink:0}
.detail-item.good::before{content:'✓';color:#16a34a}

.impact-box{background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15);border-radius:10px;padding:14px;margin-top:16px}
.impact-label{font-size:10px;font-weight:700;letter-spacing:0.08em;color:#16a34a;text-transform:uppercase;margin-bottom:6px}
.impact-text{font-size:12px;color:#475569;line-height:1.6}

/* CONNECTOR */
.connector{display:flex;align-items:center;justify-content:center;height:20px;color:var(--muted);font-size:11px;gap:6px;margin:-4px 0}
.connector::before,.connector::after{content:'';flex:1;height:1px;background:var(--border)}

/* SUMMARY */
.summary-card{background:linear-gradient(135deg,#fffbeb,#fff7ed);border:1.5px solid rgba(245,158,11,0.35);border-radius:20px;padding:28px;margin-top:8px}
.summary-headline{font-family:'Playfair Display',serif;font-size:24px;font-weight:800;color:var(--text);margin-bottom:6px;line-height:1.2}
.summary-sub{font-size:13px;color:#64748b;line-height:1.7;margin-bottom:24px}
.summary-numbers{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.sum-num{background:#fff;border:1px solid rgba(245,158,11,0.15);border-radius:12px;padding:16px;text-align:center}
.sum-val{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--amber);line-height:1}
.sum-label{font-size:11px;color:var(--muted);margin-top:4px}

.roadmap-weeks{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.week{background:#fff;border-radius:10px;padding:16px;border:1px solid rgba(245,158,11,0.15)}
.week-tag{font-size:9px;font-weight:700;letter-spacing:0.1em;color:var(--amber);text-transform:uppercase;margin-bottom:6px}
.week-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:10px}
.week-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.week-list li{font-size:11px;color:#64748b;display:flex;gap:6px;line-height:1.4}
.week-list li::before{content:'·';color:var(--amber);flex-shrink:0;font-weight:700}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.35s ease forwards}
.fade-up:nth-child(2){animation-delay:0.05s}
.fade-up:nth-child(3){animation-delay:0.1s}
.fade-up:nth-child(4){animation-delay:0.15s}
.fade-up:nth-child(5){animation-delay:0.2s}
.fade-up:nth-child(6){animation-delay:0.25s}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:3px}
input[type=number]::-webkit-inner-spin-button{opacity:0.3}

@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body { background: #fff !important; }
  .header { position: static !important; box-shadow: none !important; border-bottom: 1px solid #e2e8f0 !important; padding: 12px 24px !important; }
  .client-input, button[onclick="window.print()"] { display: none !important; }
  .layout { display: block !important; }
  .left-panel { display: none !important; }
  .right-panel { padding: 16px 24px !important; overflow: visible !important; }
  .stage { break-inside: avoid; page-break-inside: avoid; }
  .stage-body { display: block !important; }
  .summary-card { break-inside: avoid; page-break-inside: avoid; }
  .fade-up { opacity: 1 !important; animation: none !important; }
  .connector { display: none !important; }
  .gen-btn, .panel-section { display: none !important; }
  .placeholder { display: none !important; }
  @page { margin: 15mm; size: A4; }
}
</style>
</head>

<script>
var selectedType = '';

document.querySelectorAll('.type-btn').forEach(function(btn){

// Live CPL displays
function updateCPLDisplays(){
  var spend30  = parseFloat(document.getElementById('adSpend').value)  || 0;
  var leads30  = parseFloat(document.getElementById('leads').value)    || 0;
  var spend90  = parseFloat(document.getElementById('adSpend90').value)|| 0;
  var leads90  = parseFloat(document.getElementById('leads90').value)  || 0;

  var cpl30El = document.getElementById('cpl30Display');
  var cpl90El = document.getElementById('cpl90Display');
  var trendEl = document.getElementById('leadsTrendDisplay');

  if(spend30 > 0 && leads30 > 0){
    var cpl30 = spend30 / leads30;
    document.getElementById('cpl30Val').textContent = 'S$' + cpl30.toFixed(0);
    cpl30El.style.display = 'block';
  } else {
    cpl30El.style.display = 'none';
  }

  if(spend90 > 0 && leads90 > 0){
    var cpl90 = spend90 / leads90;
    document.getElementById('cpl90Val').textContent = 'S$' + cpl90.toFixed(0) + ' per lead';
    var diffEl = document.getElementById('cplDiff');
    if(spend30 > 0 && leads30 > 0){
      var cpl30v = spend30 / leads30;
      var diff = cpl30v - cpl90;
      if(Math.abs(diff) > 1){
        diffEl.textContent = diff > 0 ? '(last 30 days S$'+Math.abs(diff).toFixed(0)+' higher than avg)' : '(last 30 days S$'+Math.abs(diff).toFixed(0)+' lower than avg)';
        diffEl.style.color = diff > 0 ? '#ef4444' : '#16a34a';
      } else {
        diffEl.textContent = '(consistent with last 30 days)';
        diffEl.style.color = '#64748b';
      }
    } else {
      diffEl.textContent = '';
    }
    cpl90El.style.display = 'block';
  } else {
    cpl90El.style.display = 'none';
  }

  // Leads trend — compare last 30 days vs 90-day monthly average
  if(leads90 > 0 && leads30 > 0){
    var leadsAvgMo = leads90 / 3;
    var leadsDiff  = leads30 - leadsAvgMo;
    var leadsPct   = Math.round((leadsDiff / leadsAvgMo) * 100);
    var absDiff    = Math.round(Math.abs(leadsDiff));
    var trendText  = document.getElementById('leadsTrendText');

    if(Math.abs(leadsPct) < 5){
      // Consistent — neutral
      trendText.innerHTML = '<span style="color:#64748b">Leads are consistent with your 90-day average ('+Math.round(leadsAvgMo)+'/month).</span>';
      trendEl.style.borderColor = '#e2e8f0';
      trendEl.style.background  = '#f8fafc';
    } else if(leadsDiff < 0){
      // Down — red flag
      trendText.innerHTML = '<span style="color:#ef4444;font-weight:700">▼ '+Math.abs(leadsPct)+'% fewer leads this month</span> <span style="color:#64748b">— '+absDiff+' below your 90-day monthly average of '+Math.round(leadsAvgMo)+'. Something may have changed in the campaigns or this is a seasonal dip.</span>';
      trendEl.style.borderColor = 'rgba(239,68,68,0.25)';
      trendEl.style.background  = 'rgba(239,68,68,0.04)';
    } else {
      // Up — green but grounded
      trendText.innerHTML = '<span style="color:#16a34a;font-weight:700">▲ '+leadsPct+'% above your 90-day average this month</span> <span style="color:#64748b">— '+absDiff+' more than the '+Math.round(leadsAvgMo)+'/month average. Could be seasonal or a creative that\'s working well. Worth noting, but we look at the 90-day average for projections.</span>';
      trendEl.style.borderColor = 'rgba(34,197,94,0.25)';
      trendEl.style.background  = 'rgba(34,197,94,0.04)';
    }
    trendEl.style.display = 'block';
  } else {
    trendEl.style.display = 'none';
  }
}

function v(id){ return parseFloat(document.getElementById(id).value)||0; }
function sv(id){ return document.getElementById(id).value; }

// Uplift logic — conservative, based on 30-day realistic outcomes
function calcUplift(rt, followUp){
  // CPL improvement: 15% is achievable in 30 days with better targeting/creatives
  // More conservative than 25% — sets realistic expectation
  var cplImprove = 0.15;

  // Scheduling improvement — depends on response speed and follow-up gaps
  var schedImprove = 0;
  if(rt > 180)       schedImprove += 0.15; // very slow — biggest gain from fixing this
  else if(rt > 60)   schedImprove += 0.10;
  else if(rt > 15)   schedImprove += 0.05;
  if(followUp === 'never')       schedImprove += 0.15;
  else if(followUp === 'once')   schedImprove += 0.10;
  else if(followUp === 'manual') schedImprove += 0.05;
  schedImprove = Math.min(schedImprove, 0.25); // cap at 25%

  // Attend rate improvement — reminders + confirmation sequence
  var attendImprove = rt > 60 ? 0.08 : 0.05; // conservative: 5-8%

  // Post-tour conversion — script + follow-up process
  var convImprove = followUp === 'structured' ? 0.03 : followUp === 'manual' ? 0.07 : 0.12;
  // cap: even with no process, 12% improvement is realistic without overpromising

  return { cplImprove:cplImprove, schedImprove:schedImprove, attendImprove:attendImprove, convImprove:convImprove };
}

function pctLabel(v){ return v>0 ? '+'+Math.round(v*100)+'%' : Math.round(v*100)+'%'; }

// Cascade state
var _stageData   = null;
var _summaryHtml = '';
var _ctxHtml     = '';
var _currentStep = 0;

function handleBtn(){
  if(_currentStep === 0){
    if(!compute()) return;
    document.getElementById('genBtn').style.display = 'none';
    document.getElementById('regenBtn').style.display = 'block';
    showStep(1);
  } else if(_currentStep < 4){
    showStep(_currentStep + 1);
  } else if(_currentStep === 4){
    showStep(5);
  }
}

function regenerate(){
  _currentStep = 0;
  _stageData   = null;
  _summaryHtml = '';
  _ctxHtml     = '';
  document.getElementById('rightPanel').innerHTML = '<div class="placeholder"><div class="placeholder-icon">📊</div><p>Fill in the client\'s numbers on the left and click Generate Roadmap</p></div>';
  document.getElementById('regenBtn').style.display = 'none';
  document.getElementById('genBtn').style.display   = 'block';
  document.getElementById('genBtn').textContent     = 'Generate Roadmap \u2192';
}

function showStep(step){
  _currentStep = step;
  var panel = document.getElementById('rightPanel');
  var leftBtn = document.getElementById('genBtn');

  // Remove any existing inline next button
  var old = document.getElementById('inlineNextBtn');
  if(old) old.parentNode.removeChild(old);

  function addInlineBtn(label, onclick){
    var wrap = document.createElement('div');
    wrap.id = 'inlineNextBtn';
    wrap.style.cssText = 'margin-top:16px;margin-bottom:8px;text-align:center';
    var b = document.createElement('button');
    b.textContent = label;
    b.style.cssText = 'padding:13px 32px;background:linear-gradient(135deg,#f59e0b,#f97316);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:0.02em;box-shadow:0 4px 20px rgba(245,158,11,0.35);transition:all 0.2s';
    b.onmouseover = function(){ b.style.transform='translateY(-1px)'; b.style.boxShadow='0 6px 28px rgba(245,158,11,0.45)'; };
    b.onmouseout  = function(){ b.style.transform=''; b.style.boxShadow='0 4px 20px rgba(245,158,11,0.35)'; };
    b.onclick = onclick;
    wrap.appendChild(b);
    panel.appendChild(wrap);
  }

  if(step === 1){
    panel.innerHTML = _ctxHtml + renderStage(0);
    panel.scrollTop = 0;
    leftBtn.textContent = 'Next Stage \u2192';
    addInlineBtn('Next Stage \u2192', function(){ handleBtn(); });
  } else if(step >= 2 && step <= 4){
    var idx = step - 1;
    var connDiv = document.createElement('div');
    connDiv.className = 'connector';
    connDiv.textContent = 'unlocks the next stage';
    panel.appendChild(connDiv);
    var stageDiv = document.createElement('div');
    stageDiv.innerHTML = renderStage(idx);
    var stageEl = stageDiv.firstElementChild;
    stageEl.style.opacity = '0';
    stageEl.style.transform = 'translateY(16px)';
    panel.appendChild(stageEl);
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        stageEl.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
        stageEl.style.opacity = '1';
        stageEl.style.transform = 'translateY(0)';
        var label = step === 4 ? 'See the Full Picture \u2192' : 'Next Stage \u2192';
        addInlineBtn(label, function(){ handleBtn(); });
        setTimeout(function(){ panel.scrollTop = panel.scrollHeight; }, 420);
      });
    });
    if(step === 4) leftBtn.textContent = 'See the Full Picture \u2192';
  } else if(step === 5){
    var summaryDiv = document.createElement('div');
    summaryDiv.innerHTML = _summaryHtml;
    var card = summaryDiv.firstElementChild;
    card.style.opacity = '0';
    card.style.transform = 'translateY(16px)';
    panel.appendChild(card);
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
        setTimeout(function(){ panel.scrollTop = panel.scrollHeight; }, 520);
      });
    });
    leftBtn.style.display = 'none';
  }
}

function renderStage(idx){
  var s = _stageData[idx];
  var html = '';
  html += '<div class="stage" style="border-color:'+s.border+'">';
  html += '<div class="stage-header" onclick="toggleStage(this)">';
  html += '<div class="stage-num" style="background:'+s.bg+';color:'+s.color+'">'+s.num+'</div>';
  html += '<div class="stage-info"><div class="stage-name">'+s.name+'</div><div class="stage-driver">'+s.driver+'</div></div>';
  html += '<div class="metric-box"><div class="metric-label">Now</div><div class="metric-value now">'+s.now+'</div></div>';
  html += '<div class="arrow-box"><div class="arrow-icon">\u2192</div><div class="arrow-pct">'+s.pct+'</div></div>';
  html += '<div class="metric-box"><div class="metric-label" style="color:#16a34a">After AAA</div><div class="metric-value after">'+s.after+'</div></div>';
  html += '</div>';
  html += '<div class="stage-body open">';
  html += '<div class="stage-detail">';
  html += '<div class="detail-block"><div class="detail-title">What We Do</div><div class="detail-items">';
  s.whatWeDo.forEach(function(w){ html += '<div class="detail-item">'+w+'</div>'; });
  html += '</div></div>';
  html += '<div class="detail-block"><div class="impact-box"><div class="impact-label">\ud83d\udca1 What This Unlocks</div><div class="impact-text">'+s.impact+'</div></div></div>';
  html += '</div></div>';
  html += '</div>';
  return html;
}

function generate(){ handleBtn(); }

function compute(){
  var adSpend    = v('adSpend');
  var leads      = v('leads');
  var adSpend90  = v('adSpend90');
  var leads90    = v('leads90');
  var scheduled  = v('scheduled');
  var attended   = v('attended');
  var enrolments = v('enrolments');
  var fee        = v('fee');
  var retention  = v('retention')||12;
  var rt         = parseFloat(sv('responseTime'))||60;
  var followUp   = sv('followUp')||'once';
  var client     = document.getElementById('clientName').value||'Your Centre';

  if(!selectedType||!adSpend||!leads||!enrolments){
    alert('Please select a centre type and fill in ad spend, leads and enrolments.');
    return false;
  }

  _currentStep = 0; _stageData = null; _summaryHtml = ''; _ctxHtml = '';

  var isP = selectedType === 'Preschool / Early Childhood';
  var tw  = isP ? 'tour' : 'trial';
  var twC = isP ? 'Tour' : 'Trial';

  var cpl30 = leads > 0 ? adSpend/leads : 0;
  var has90   = adSpend90 > 0 && leads90 > 0;
  var cpl90   = has90 ? adSpend90/leads90 : cpl30;
  var baseCPL = has90 ? cpl90 : cpl30;
  var leads90mo = has90 ? leads90/3 : leads;
  var ltv = fee * retention;
  var up  = calcUplift(rt, followUp);

  var newCpl        = Math.min(baseCPL * (1 - up.cplImprove), cpl30 * 0.97); // never worse than current 30-day
  var newLeads      = adSpend / newCpl;
  var currentScheduled = scheduled || Math.round(leads * 0.25);
  var currentAttended  = attended  || Math.round(currentScheduled * 0.65);
  var schedRate     = leads > 0 && scheduled > 0 ? scheduled/leads : 0.25;
  var newSchedRate  = Math.min(schedRate * (1 + up.schedImprove), 0.80);
  var newScheduled  = newLeads * newSchedRate;
  var attendRate    = scheduled > 0 && attended > 0 ? attended/scheduled : 0.65;
  var newAttendRate = Math.min(attendRate * (1 + up.attendImprove), 0.90);
  var newAttended   = newScheduled * newAttendRate;
  var convRate      = attended > 0 && enrolments > 0 ? enrolments/attended : (enrolments/leads);
  var newConvRate   = Math.min(convRate * (1 + up.convImprove), 0.85);
  var newEnrolments = newAttended * newConvRate;
  var wastedBudget  = (baseCPL - newCpl) * leads90mo;
  var monthlyGain   = (newEnrolments - enrolments) * ltv;
  var annualGain    = monthlyGain * 12;
  var cplVolatile   = has90 && Math.abs(cpl30 - cpl90) / cpl90 > 0.15;

  // Context banners
  var ctx = '';
  if(has90){
    ctx += '<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:flex-start;gap:12px"><div style="font-size:16px;margin-top:2px">\ud83d\udcca</div><div style="flex:1"><div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">CPL Context</div><div style="display:flex;gap:24px;flex-wrap:wrap">';
    ctx += '<div><div style="font-size:10px;color:#94a3b8;margin-bottom:2px">Last 30 days</div><div style="font-size:16px;font-weight:800;color:'+(cpl30>cpl90?'#ef4444':'#16a34a')+'">S$'+cpl30.toFixed(0)+'</div></div>';
    ctx += '<div><div style="font-size:10px;color:#94a3b8;margin-bottom:2px">90-day average</div><div style="font-size:16px;font-weight:800;color:#0f172a">S$'+cpl90.toFixed(0)+'</div></div>';
    if(cplVolatile){
      ctx += '<div style="flex:1;min-width:160px;background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.2);border-radius:8px;padding:8px 12px;font-size:11px;color:#92400e;line-height:1.5">'+(cpl30>cpl90?'\u26a0 Last month CPL '+Math.round(((cpl30-cpl90)/cpl90)*100)+'% above 90-day avg. Projections use 90-day avg.':'\u2713 Last month CPL '+Math.round(((cpl90-cpl30)/cpl90)*100)+'% below 90-day avg. Projections use 90-day avg to keep expectations grounded.')+'</div>';
    } else {
      ctx += '<div style="flex:1;font-size:11px;color:#64748b;line-height:1.6;padding-top:4px">Consistent — last 30 days tracks closely with the 90-day average. Projections use the 90-day average.</div>';
    }
    ctx += '</div></div></div>';
  }
  ctx += '<div style="background:rgba(96,165,250,0.06);border:1px solid rgba(96,165,250,0.2);border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:flex-start;gap:12px"><div style="font-size:16px;margin-top:2px">\ud83d\uddd3</div><div><div style="font-size:11px;font-weight:700;color:#1d4ed8;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Setting the right expectations</div><div style="font-size:12px;color:#475569;line-height:1.6">The 30-day plan is about putting the right things in place — not instant results. Ad improvements take 2\u20134 weeks to show. Reply and follow-up systems start working immediately. Enrolment gains typically show clearly in Month 2 and compound from there.</div></div></div>';
  _ctxHtml = ctx;

  // Stages
  _stageData = [

  ];
